{% extends "base.html" %}

{% block title %}Error - Azure SLA{% endblock %}

{% block content %}
<div class="text-center py-12">
    <svg class="mx-auto h-16 w-16 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
    </svg>
    <h1 class="mt-4 text-2xl font-bold text-gray-900">{{ error or 'An error occurred' }}</h1>
    <p class="mt-2 text-gray-600">Something went wrong. Please try again.</p>
    <a href="/" class="mt-6 inline-block px-4 py-2 bg-azure-500 text-white rounded-md hover:bg-azure-600">
        Back to Dashboard
    </a>
</div>
{% endblock %}
