<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Azure SLA Dashboard{% endblock %}</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Segoe UI Font (Azure's font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- HTMX for interactive updates -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Alpine.js for simple interactivity -->
    <script defer src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js"></script>
    
    <!-- Chart.js for visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Segoe UI"', 'Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        azure: {
                            50: '#e6f2ff',
                            100: '#cce5ff',
                            200: '#99cbff',
                            300: '#66b0ff',
                            400: '#3396ff',
                            500: '#0078d4',
                            600: '#005a9e',
                            700: '#004578',
                            800: '#003052',
                            900: '#001b2e',
                            950: '#00111c',
                        },
                        // Azure Portal exact colors
                        portal: {
                            bg: '#faf9f8',           // Content background
                            sidebar: '#1b1b1b',       // Left nav background  
                            sidebarHover: '#2d2d2d',  // Sidebar hover
                            header: '#0078d4',        // Top bar
                            headerDark: '#002050',    // Darker header variant
                            border: '#e1dfdd',        // Borders
                            text: '#323130',          // Primary text
                            textSec: '#605e5c',       // Secondary text
                        }
                    },
                    boxShadow: {
                        'azure': '0 1.6px 3.6px 0 rgba(0,0,0,0.132), 0 0.3px 0.9px 0 rgba(0,0,0,0.108)',
                        'azure-lg': '0 6.4px 14.4px 0 rgba(0,0,0,0.132), 0 1.2px 3.6px 0 rgba(0,0,0,0.108)',
                    },
                }
            }
        }
    </script>
    
    <style>
        [x-cloak] { display: none !important; }
        
        /* Custom scrollbar - Azure style */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c8c6c4; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a19f9d; }
        
        /* Sidebar link styles - Azure portal style */
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 14px;
            color: #fff;
            font-size: 13px;
            border-radius: 2px;
            transition: background-color 0.1s ease;
        }
        .sidebar-link:hover {
            background-color: #2d2d2d;
        }
        .sidebar-link.active {
            background-color: #0078d4;
        }
        
        /* Filter chip style */
        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: #fff;
            border: 1px solid #8a8886;
            border-radius: 2px;
            font-size: 13px;
            color: #323130;
            cursor: pointer;
            transition: all 0.1s ease;
        }
        .filter-chip:hover {
            border-color: #323130;
        }
        .filter-chip .remove {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 2px;
            color: #605e5c;
        }
        .filter-chip .remove:hover {
            background: #edebe9;
            color: #323130;
        }
        
        /* Command button style */
        .cmd-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            font-size: 13px;
            color: #323130;
            background: transparent;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            transition: background-color 0.1s ease;
        }
        .cmd-btn:hover {
            background-color: #f3f2f1;
        }
        .cmd-btn svg {
            width: 16px;
            height: 16px;
        }
        .cmd-btn-primary {
            color: #0078d4;
        }
        
        /* Table styles - Azure style */
        .azure-table th {
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            color: #605e5c;
            padding: 8px 12px;
            background: #faf9f8;
            border-bottom: 1px solid #e1dfdd;
        }
        .azure-table td {
            padding: 10px 12px;
            font-size: 13px;
            color: #323130;
            border-bottom: 1px solid #f3f2f1;
        }
        .azure-table tr:hover td {
            background: #f3f2f1;
        }
        
        /* Input focus - Azure blue outline */
        input:focus, select:focus, button:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.3);
        }
        
        /* Azure link style */
        .azure-link {
            color: #0078d4;
            text-decoration: none;
        }
        .azure-link:hover {
            text-decoration: underline;
        }
    </style>
    
    {% block head %}{% endblock %}
</head>
<body class="h-full bg-portal-bg font-sans antialiased" x-data="{ sidebarOpen: false }">
    <div class="flex flex-col h-full">
        
        <!-- Azure-style Top Header Bar -->
        <header class="flex items-center h-10 bg-[#0078d4] text-white px-4 z-50">
            <!-- Left: Microsoft Azure branding -->
            <div class="flex items-center gap-4">
                <button class="p-1 hover:bg-white/10 rounded">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <span class="font-semibold text-[15px] tracking-tight">Microsoft Azure</span>
            </div>
            
            <!-- Center: Spacer -->
            <div class="flex-1"></div>
            
            <!-- Right: Identity -->
            <div class="flex items-center">
                <div class="text-[11px] leading-tight text-right">
                    <div class="text-white/90">SLA Dashboard</div>
                    <div class="text-white/60">Azure Compliance</div>
                </div>
            </div>
        </header>
        
        <div class="flex flex-1 overflow-hidden">
            <!-- Left Sidebar - Azure Portal Style -->
            <aside class="hidden lg:flex flex-col w-[220px] bg-portal-sidebar text-white flex-shrink-0 border-r border-[#252525]">
            <!-- Navigation items -->
            <nav class="flex-1 overflow-y-auto py-4 px-2 space-y-0.5">
                <!-- Dashboard -->
                <a href="/" class="sidebar-link {% if request.url.path == '/' %}active{% endif %}">
                    <svg class="w-4 h-4 text-[#10b981]" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"/>
                    </svg>
                    Dashboard
                </a>
                
                <!-- All resources -->
                <a href="/resources" class="sidebar-link {% if '/resources' in request.url.path %}active{% endif %}">
                    <svg class="w-4 h-4 text-[#f59e0b]" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/>
                    </svg>
                    Resources
                </a>
                
                <!-- Settings -->
                <a href="/settings" class="sidebar-link {% if '/settings' in request.url.path %}active{% endif %}">
                    <svg class="w-4 h-4 text-[#a3a3a3]" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
                    </svg>
                    Settings
                </a>
            </nav>
                
            </aside>
            
            <!-- Mobile sidebar toggle & backdrop -->
            <div x-show="sidebarOpen" x-cloak @click="sidebarOpen = false"
                 class="fixed inset-0 z-40 bg-black/50 lg:hidden"></div>
            <div x-show="sidebarOpen" x-cloak
                 class="fixed inset-y-0 left-0 z-50 w-[220px] bg-portal-sidebar lg:hidden"
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="-translate-x-full"
                 x-transition:enter-end="translate-x-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="translate-x-0"
                 x-transition:leave-end="-translate-x-full">
                <nav class="h-full overflow-y-auto py-4 px-2">
                    <a href="/" class="sidebar-link {% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
                    <a href="/resources" class="sidebar-link {% if '/resources' in request.url.path %}active{% endif %}">Resources</a>
                    <a href="/settings" class="sidebar-link {% if '/settings' in request.url.path %}active{% endif %}">Settings</a>
                </nav>
            </div>
            
            <!-- Main Content Area -->
            <main class="flex-1 flex flex-col overflow-hidden">
                <!-- Breadcrumb bar -->
                <div class="flex items-center h-10 px-4 bg-portal-bg border-b border-portal-border">
                    <button @click="sidebarOpen = true" class="lg:hidden p-1 mr-3 rounded hover:bg-black/5">
                        <svg class="w-5 h-5 text-portal-text" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <nav class="flex items-center gap-1.5 text-[13px]">
                        <a href="/" class="text-azure-500 hover:underline">Home</a>
                        <svg class="w-3 h-3 text-portal-textSec" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                        <span class="text-portal-text">{% block breadcrumb %}SLA Dashboard{% endblock %}</span>
                    </nav>
                </div>
                
                <!-- Page content -->
                <div class="flex-1 overflow-y-auto">
                    {% block content %}{% endblock %}
                </div>
                
                <!-- Footer -->
                <footer class="flex items-center justify-between h-7 px-4 bg-portal-bg border-t border-portal-border text-[11px] text-portal-textSec">
                    <span>Azure SLA Dashboard v0.1.0</span>
                    <a href="#" class="flex items-center gap-1 text-azure-500 hover:underline">
                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        Give feedback
                    </a>
                </footer>
            </main>
        </div>
    </div>
    
    {% block scripts %}{% endblock %}
</body>
</html>
